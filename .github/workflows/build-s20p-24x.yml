name: Build CLX S20P ImmortalWrt 24X

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-setuptools rsync unzip zlib1g-dev file wget curl ccache

      - name: Clone ImmortalWrt 24.10
        run: |
          git clone --depth=1 -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Clone S20P source
        run: |
          git clone --depth=1 -b v7672 https://github.com/lgs2007m/immortalwrt-mt798x.git s20p-src

      - name: Port CLX S20P DTS and profile
        run: |
          find s20p-src/target/linux/mediatek -iname "*s20p*" -o -iname "*clx*"
          mkdir -p openwrt/target/linux/mediatek/dts
          cp -av s20p-src/target/linux/mediatek/dts/*s20p* openwrt/target/linux/mediatek/dts/ 2>/dev/null || true
          cp -av s20p-src/target/linux/mediatek/dts/*clx* openwrt/target/linux/mediatek/dts/ 2>/dev/null || true

          OLD_IMAGE="$(grep -Ril "clx_s20p\|s20p" s20p-src/target/linux/mediatek/image | head -n1)"
          NEW_IMAGE="openwrt/target/linux/mediatek/image/filogic.mk"

          if [ -n "$OLD_IMAGE" ]; then
            sed -n '/define Device.*clx_s20p/,/endef/p' "$OLD_IMAGE" >> /tmp/s20p-device.txt || true
            sed -n '/define Device.*s20p/,/endef/p' "$OLD_IMAGE" >> /tmp/s20p-device.txt || true
            if [ -s /tmp/s20p-device.txt ]; then
              echo "" >> "$NEW_IMAGE"
              echo "# CLX S20P ported profile" >> "$NEW_IMAGE"
              cat /tmp/s20p-device.txt >> "$NEW_IMAGE"
            fi
          fi

          grep -Rni "clx_s20p\|s20p" openwrt/target/linux/mediatek/image openwrt/target/linux/mediatek/dts || true

      - name: Add iStore feeds
        working-directory: openwrt
        run: |
          echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate S20P config
        working-directory: openwrt
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-dsa=y
          CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_clx_s20p-dsa=""
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-gsw=y
          CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_clx_s20p-gsw=""
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-store=y
          CONFIG_PACKAGE_luci-lib-taskd=y
          CONFIG_PACKAGE_luci-lib-xterm=y

          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-ttyd=y

          CONFIG_PACKAGE_libustream-mbedtls=y
          # CONFIG_PACKAGE_libustream-openssl is not set
          # CONFIG_PACKAGE_libustream-wolfssl is not set
          # CONFIG_PACKAGE_luci-ssl is not set

          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set
          # CONFIG_PACKAGE_wpad-openssl is not set
          # CONFIG_PACKAGE_wpad is not set
          # CONFIG_PACKAGE_hostapd is not set
          # CONFIG_PACKAGE_iw is not set
          # CONFIG_PACKAGE_iwinfo is not set
          # CONFIG_PACKAGE_wireless-regdb is not set
          EOF

          make defconfig
          grep -E "CONFIG_TARGET_DEVICE_.*s20p|libustream|luci-ssl" .config || true

      - name: Download packages
        working-directory: openwrt
        run: |
          make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: clx-s20p-immortalwrt-24x
          path: openwrt/bin/targets/
