name: Build CLX S20P ImmortalWrt 24.10

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  S20P_SRC_URL: https://github.com/lgs2007m/immortalwrt-mt798x.git
  S20P_SRC_BRANCH: v7672
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: false
          haskell: false
          large-packages: false
          swap-storage: false

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -yqq update
          sudo -E apt-get -yqq install ca-certificates curl file git rsync unzip wget
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt-get -yqq autoremove --purge
          sudo -E apt-get -yqq clean

      - name: Clone ImmortalWrt 24.10
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Clone known-good S20P source
        run: |
          git clone --depth=1 -b "$S20P_SRC_BRANCH" "$S20P_SRC_URL" s20p-src

      - name: Port CLX S20P DTS and image profiles
        run: |
          set -euxo pipefail

          old_mediatek="s20p-src/target/linux/mediatek"
          new_mediatek="openwrt/target/linux/mediatek"
          new_dts_dir="$new_mediatek/dts"
          new_image="$new_mediatek/image/filogic.mk"

          test -d "$old_mediatek"
          test -f "$new_image"
          mkdir -p "$new_dts_dir"

          mapfile -t dts_files < <(find "$old_mediatek" -type f \( -iname '*s20p*.dts' -o -iname '*s20p*.dtsi' -o -iname '*clx*.dts' -o -iname '*clx*.dtsi' \) | sort)
          if [ "${#dts_files[@]}" -eq 0 ]; then
            echo "::error::No CLX S20P DTS/DTSI files found in $old_mediatek"
            exit 1
          fi

          for src in "${dts_files[@]}"; do
            dst="$new_dts_dir/$(basename "$src")"
            cp -v "$src" "$dst"
            sed -i \
              -e 's/#include "mt7986a\.dtsi"/#include "mt7986a.dtsi"/g' \
              -e 's/#include "mt7986\.dtsi"/#include "mt7986a.dtsi"/g' \
              -e '/#include "mt7986a-pinctrl\.dtsi"/d' \
              -e 's/&wbsys/\&wifi/g' \
              -e 's/&xhci/\&ssusb/g' \
              -e 's/&pcie0_pins/\&pcie_pins/g' \
              -e 's/&pcie0/\&pcie/g' \
              -e 's/function = "flash"/function = "emmc"/g' \
              -e 's/MTK_DRIVE_4mA/4/g' \
              -e 's/MTK_DRIVE_6mA/6/g' \
              -e 's/MTK_DRIVE_8mA/8/g' \
              "$dst"
            perl -0pi -e 's/\n&hnat\s*\{.*?\n\};\n/\n/s' "$dst"
            perl -0pi -e 's/(&pcie\s*\{.*?\n\};)/$1\n\n&pcie_phy {\n\tstatus = "okay";\n};/s' "$dst"
            perl -0pi -e 's/(&ssusb\s*\{.*?\n\};)/$1\n\n&usb_phy {\n\tstatus = "okay";\n};/s' "$dst"
            if ! grep -q 'pcie_pins: pcie-pins' "$dst"; then
              perl -0pi -e 's/&pio \{/&pio {\n\tpcie_pins: pcie-pins {\n\t\tmux {\n\t\t\tfunction = "pcie";\n\t\t\tgroups = "pcie_clk", "pcie_wake", "pcie_pereset";\n\t\t};\n\t};\n/s' "$dst"
            fi

            # The old 5.4 vendor tree reset the two RTL8221B PHYs through
            # ext-phy-reset-gpios on the MAC nodes. Kernel 6.6 consumes the
            # standard MDIO PHY reset binding instead, so mirror the same
            # GPIOs onto phy@5/phy@7 while keeping the old MAC properties.
            perl -0pi -e 's/(reg_1p8v:\s*regulator-1p8v\s*\{(?![^}]*regulator-always-on;)[^}]*regulator-boot-on;\r?\n)/$1\t\tregulator-always-on;\n/s' "$dst"
            perl -0pi -e 's/(reg_3p3v:\s*regulator-3p3v\s*\{(?![^}]*regulator-always-on;)[^}]*regulator-boot-on;\r?\n)/$1\t\tregulator-always-on;\n/s' "$dst"
            perl -0pi -e 's/(phy5:\s*phy\@5\s*\{(?![^}]*reset-gpios)[^}]*reg = <5>;\s*\r?\n)(\s*\};)/$1\t\t\tphy-mode = "2500base-x";\n\t\t\treset-gpios = <&pio 48 GPIO_ACTIVE_HIGH>;\n\t\t\treset-assert-us = <100000>;\n\t\t\treset-deassert-us = <100000>;\n$2/s' "$dst"
            perl -0pi -e 's/(phy7:\s*phy\@7\s*\{(?![^}]*reset-gpios)[^}]*reg = <7>;\s*\r?\n)(\s*\};)/$1\t\t\tphy-mode = "2500base-x";\n\t\t\treset-gpios = <&pio 6 GPIO_ACTIVE_HIGH>;\n\t\t\treset-assert-us = <100000>;\n\t\t\treset-deassert-us = <100000>;\n$2/s' "$dst"
          done

          grep -RniE 'phy[57]: phy@[57]|ext-phy-reset-gpios|reset-gpios = <&pio (48|6) GPIO_ACTIVE_HIGH>|regulator-always-on' "$new_dts_dir"
          grep -Rq 'ext-phy-reset-gpios = <&pio 48 GPIO_ACTIVE_HIGH>;' "$new_dts_dir"
          grep -Rq 'ext-phy-reset-gpios = <&pio 6 GPIO_ACTIVE_HIGH>;' "$new_dts_dir"
          grep -Rq '^[[:space:]]*reset-gpios = <&pio 48 GPIO_ACTIVE_HIGH>;' "$new_dts_dir"
          grep -Rq '^[[:space:]]*reset-gpios = <&pio 6 GPIO_ACTIVE_HIGH>;' "$new_dts_dir"

          old_image="$(grep -RilE 'define Device/.*clx_s20p|define Device/.*s20p|DEVICE_.*clx_s20p|DEVICE_.*s20p' "$old_mediatek/image" | head -n1 || true)"
          if [ -z "$old_image" ]; then
            echo "::error::No CLX S20P image profile found in $old_mediatek/image"
            exit 1
          fi

          awk '
            BEGIN { capture = 0; want_target = 0 }
            /^define Device\/.*(clx_s20p|s20p)/ { capture = 1 }
            capture {
              print
              if (/^endef/) {
                capture = 0
                want_target = 1
              }
              next
            }
            want_target && /^TARGET_DEVICES \+= .*clx_s20p/ {
              print
              print ""
              want_target = 0
            }
          ' "$old_image" > /tmp/clx-s20p-profiles.mk

          if ! grep -q 'define Device/.*clx_s20p' /tmp/clx-s20p-profiles.mk; then
            echo "::error::Failed to extract CLX S20P image profiles from $old_image"
            exit 1
          fi

          grep -q '^TARGET_DEVICES += clx_s20p-dsa$' /tmp/clx-s20p-profiles.mk
          grep -q '^TARGET_DEVICES += clx_s20p-gsw$' /tmp/clx-s20p-profiles.mk

          sed -i \
            -e 's/DEVICE_DTS_DIR := .*/DEVICE_DTS_DIR := ..\/dts/g' \
            -e 's/\bmt7986\b/filogic/g' \
            -e 's/TARGET_mediatek_mt7986/TARGET_mediatek_filogic/g' \
            -e 's/DEVICE_PACKAGES :=/DEVICE_PACKAGES +=/g' \
            /tmp/clx-s20p-profiles.mk

          {
            echo ''
            echo '# CLX S20P ported from lgs2007m/immortalwrt-mt798x v7672'
            cat /tmp/clx-s20p-profiles.mk
          } >> "$new_image"

          grep -RniE 'clx_s20p|s20p' "$new_image" "$new_dts_dir"
          grep -q '^TARGET_DEVICES += clx_s20p-dsa$' "$new_image"
          grep -q '^TARGET_DEVICES += clx_s20p-gsw$' "$new_image"

      - name: Add iStore feed
        working-directory: openwrt
        run: |
          cat >> feeds.conf.default <<'EOF'
          src-git istore https://github.com/linkease/istore;main
          EOF

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds update istore
          ./scripts/feeds install -a
          ./scripts/feeds install -d y -p istore luci-app-store

      - name: Generate CLX S20P config
        working-directory: openwrt
        run: |
          set -euxo pipefail
          cat > .config <<'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-dsa=y
          CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_clx_s20p-dsa=""
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-gsw=y
          CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_clx_s20p-gsw=""
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-store=y
          CONFIG_PACKAGE_luci-lib-taskd=y
          CONFIG_PACKAGE_luci-lib-xterm=y

          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-ttyd=y

          CONFIG_PACKAGE_lua-cjson=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-f2fs=y
          CONFIG_PACKAGE_kmod-fuse=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-br-netfilter=y
          CONFIG_PACKAGE_kmod-nf-ipvs=y

          # Keep Wi-Fi disabled by default and do not pull hostapd/wpad.
          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set
          # CONFIG_PACKAGE_wpad-openssl is not set
          # CONFIG_PACKAGE_wpad is not set
          # CONFIG_PACKAGE_hostapd is not set
          # CONFIG_PACKAGE_iw is not set
          # CONFIG_PACKAGE_iwinfo is not set
          # CONFIG_PACKAGE_wireless-regdb is not set
          # CONFIG_PACKAGE_luci-app-mtwifi-cfg is not set
          # CONFIG_PACKAGE_luci-i18n-mtwifi-cfg-zh-cn is not set
          # CONFIG_PACKAGE_mtwifi-cfg is not set
          EOF

          make defconfig

          grep -q '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-dsa=y' .config
          grep -q '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-gsw=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-store=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-dockerman=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-ttyd=y' .config
          grep -q '^# CONFIG_PACKAGE_wpad-basic-mbedtls is not set' .config

      - name: Download packages
        working-directory: openwrt
        run: |
          make download -j"$(nproc)"
          find dl -size -1024c -print -delete

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: List firmware outputs
        if: always()
        working-directory: openwrt
        run: |
          if [ ! -d bin/targets ]; then
            echo "bin/targets does not exist yet"
            exit 0
          fi
          find bin/targets -maxdepth 5 -type f -printf "%p %s bytes\n" | sort
          find bin/targets -type f \( -name "*.bin" -o -name "*.itb" -o -name "*sysupgrade*" \) -printf "%p %s bytes\n" | sort
          grep -E "CONFIG_TARGET_DEVICE_.*s20p|CONFIG_TARGET_PROFILE|CONFIG_TARGET_MULTI_PROFILE" .config || true

      - name: Verify real S20P firmware output
        working-directory: openwrt
        run: |
          set -euxo pipefail
          target_dir="bin/targets/mediatek/filogic"
          test -d "$target_dir"

          sysupgrade_count="$(find "$target_dir" -maxdepth 1 -type f -iname '*s20p*sysupgrade*' | wc -l)"
          firmware_count="$(find "$target_dir" -maxdepth 1 -type f \( -iname '*s20p*.bin' -o -iname '*s20p*.itb' \) | wc -l)"

          if [ "$sysupgrade_count" -eq 0 ]; then
            echo "::error::Missing *s20p*sysupgrade* output in $target_dir"
            exit 1
          fi

          if [ "$firmware_count" -eq 0 ]; then
            echo "::error::Missing *s20p*.bin or *s20p*.itb output in $target_dir"
            exit 1
          fi

          find "$target_dir" -maxdepth 1 -type f \( -iname '*s20p*sysupgrade*' -o -iname '*s20p*.bin' -o -iname '*s20p*.itb' \) -printf '%p %s bytes\n' | sort

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: clx-s20p-immortalwrt-24.10
          if-no-files-found: error
          path: |
            openwrt/bin/targets/mediatek/filogic/*s20p*
            openwrt/bin/targets/mediatek/filogic/*S20P*
            openwrt/bin/targets/mediatek/filogic/sha256sums
            openwrt/bin/targets/mediatek/filogic/config.buildinfo
            openwrt/bin/targets/mediatek/filogic/profiles.json
