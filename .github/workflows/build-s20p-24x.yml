name: Build CLX S20P ImmortalWrt 24.10

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  S20P_SRC_URL: https://github.com/lgs2007m/immortalwrt-mt798x.git
  S20P_SRC_BRANCH: v7672
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: false
          haskell: false
          large-packages: false
          swap-storage: false

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -yqq update
          sudo -E apt-get -yqq install ca-certificates curl file git rsync unzip wget
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt-get -yqq autoremove --purge
          sudo -E apt-get -yqq clean

      - name: Clone ImmortalWrt 24.10
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Clone known-good S20P source
        run: |
          git clone --depth=1 -b "$S20P_SRC_BRANCH" "$S20P_SRC_URL" s20p-src

      - name: Port CLX S20P DTS and image profiles
        run: |
          set -euxo pipefail

          old_mediatek="s20p-src/target/linux/mediatek"
          new_mediatek="openwrt/target/linux/mediatek"
          new_dts_dir="$new_mediatek/dts"
          new_image="$new_mediatek/image/filogic.mk"

          test -d "$old_mediatek"
          test -f "$new_image"
          mkdir -p "$new_dts_dir"

          mapfile -t dts_files < <(find "$old_mediatek" -type f \( -iname '*s20p*.dts' -o -iname '*s20p*.dtsi' -o -iname '*clx*.dts' -o -iname '*clx*.dtsi' \) | sort)
          if [ "${#dts_files[@]}" -eq 0 ]; then
            echo "::error::No CLX S20P DTS/DTSI files found in $old_mediatek"
            exit 1
          fi

          for src in "${dts_files[@]}"; do
            dst="$new_dts_dir/$(basename "$src")"
            cp -v "$src" "$dst"
            sed -i \
              -e 's/#include "mt7986a\.dtsi"/#include "mt7986a.dtsi"/g' \
              -e 's/#include "mt7986\.dtsi"/#include "mt7986a.dtsi"/g' \
              -e '/#include "mt7986a-pinctrl\.dtsi"/d' \
              -e 's/model = "CLX S20P";/model = "ZBZ S20MP";/g' \
              -e 's/&wbsys/\&wifi/g' \
              -e 's/&xhci/\&ssusb/g' \
              -e 's/&pcie0_pins/\&pcie_pins/g' \
              -e 's/&pcie0/\&pcie/g' \
              -e 's/function = "flash"/function = "emmc"/g' \
              -e 's/MTK_DRIVE_4mA/4/g' \
              -e 's/MTK_DRIVE_6mA/6/g' \
              -e 's/MTK_DRIVE_8mA/8/g' \
              "$dst"
            perl -0pi -e 's/\n&hnat\s*\{.*?\n\};\n/\n/s' "$dst"
            perl -0pi -e 's/(&pcie\s*\{.*?\n\};)/$1\n\n&pcie_phy {\n\tstatus = "okay";\n};/s' "$dst"
            perl -0pi -e 's/(&ssusb\s*\{.*?\n\};)/$1\n\n&usb_phy {\n\tstatus = "okay";\n};/s' "$dst"
            if ! grep -q 'pcie_pins: pcie-pins' "$dst"; then
              perl -0pi -e 's/&pio \{/&pio {\n\tpcie_pins: pcie-pins {\n\t\tmux {\n\t\t\tfunction = "pcie";\n\t\t\tgroups = "pcie_clk", "pcie_wake", "pcie_pereset";\n\t\t};\n\t};\n/s' "$dst"
            fi
            if ! grep -q 'ethernet0 = &gmac0;' "$dst"; then
              perl -0pi -e 's/(aliases\s*\{\n)/$1\t\tethernet0 = \&gmac0;\n\t\tethernet1 = \&gmac1;\n/s' "$dst"
            fi

            # The old 5.4 vendor tree reset the two RTL8221B PHYs through
            # ext-phy-reset-gpios on the MAC nodes. Kernel 6.6 consumes the
            # standard MDIO PHY reset binding instead, so mirror the same
            # GPIOs onto phy@5/phy@7 while keeping the old MAC properties.
            perl -0pi -e 's/(reg_1p8v:\s*regulator-1p8v\s*\{(?![^}]*regulator-always-on;)[^}]*regulator-boot-on;\r?\n)/$1\t\tregulator-always-on;\n/s' "$dst"
            perl -0pi -e 's/(reg_3p3v:\s*regulator-3p3v\s*\{(?![^}]*regulator-always-on;)[^}]*regulator-boot-on;\r?\n)/$1\t\tregulator-always-on;\n/s' "$dst"
            sed -i \
              -e 's/ext-phy-reset-gpios = <&pio 48 GPIO_ACTIVE_HIGH>;/ext-phy-reset-gpios = <\&pio 48 GPIO_ACTIVE_LOW>;/g' \
              -e 's/ext-phy-reset-gpios = <&pio 6 GPIO_ACTIVE_HIGH>;/ext-phy-reset-gpios = <\&pio 6 GPIO_ACTIVE_LOW>;/g' \
              "$dst"
            perl -0pi -e 's/(phy5:\s*phy\@5\s*\{(?![^}]*reset-gpios)[^}]*reg = <5>;\s*\r?\n)(\s*\};)/$1\t\t\tphy-mode = "2500base-x";\n\t\t\treset-gpios = <&pio 48 GPIO_ACTIVE_LOW>;\n\t\t\treset-assert-us = <100000>;\n\t\t\treset-deassert-us = <100000>;\n$2/s' "$dst"
            perl -0pi -e 's/(phy7:\s*phy\@7\s*\{(?![^}]*reset-gpios)[^}]*reg = <7>;\s*\r?\n)(\s*\};)/$1\t\t\tphy-mode = "2500base-x";\n\t\t\treset-gpios = <&pio 6 GPIO_ACTIVE_LOW>;\n\t\t\treset-assert-us = <100000>;\n\t\t\treset-deassert-us = <100000>;\n$2/s' "$dst"
          done

          grep -RniE 'phy[57]: phy@[57]|ext-phy-reset-gpios|reset-gpios = <&pio (48|6) GPIO_ACTIVE_LOW>|regulator-always-on' "$new_dts_dir"
          grep -Rq 'ext-phy-reset-gpios = <&pio 48 GPIO_ACTIVE_LOW>;' "$new_dts_dir"
          grep -Rq 'ext-phy-reset-gpios = <&pio 6 GPIO_ACTIVE_LOW>;' "$new_dts_dir"
          grep -Rq '^[[:space:]]*reset-gpios = <&pio 48 GPIO_ACTIVE_LOW>;' "$new_dts_dir"
          grep -Rq '^[[:space:]]*reset-gpios = <&pio 6 GPIO_ACTIVE_LOW>;' "$new_dts_dir"

          old_image="$(grep -RilE 'define Device/.*clx_s20p|define Device/.*s20p|DEVICE_.*clx_s20p|DEVICE_.*s20p' "$old_mediatek/image" | head -n1 || true)"
          if [ -z "$old_image" ]; then
            echo "::error::No CLX S20P image profile found in $old_mediatek/image"
            exit 1
          fi

          awk '
            BEGIN { capture = 0; want_target = 0 }
            /^define Device\/.*(clx_s20p|s20p)/ { capture = 1 }
            capture {
              print
              if (/^endef/) {
                capture = 0
                want_target = 1
              }
              next
            }
            want_target && /^TARGET_DEVICES \+= .*clx_s20p/ {
              print
              print ""
              want_target = 0
            }
          ' "$old_image" > /tmp/clx-s20p-profiles.mk

          if ! grep -q 'define Device/.*clx_s20p' /tmp/clx-s20p-profiles.mk; then
            echo "::error::Failed to extract CLX S20P image profiles from $old_image"
            exit 1
          fi

          grep -q '^TARGET_DEVICES += clx_s20p-dsa$' /tmp/clx-s20p-profiles.mk
          grep -q '^TARGET_DEVICES += clx_s20p-gsw$' /tmp/clx-s20p-profiles.mk

          sed -i \
            -e 's/DEVICE_DTS_DIR := .*/DEVICE_DTS_DIR := ..\/dts/g' \
            -e 's/DEVICE_VENDOR := CLX/DEVICE_VENDOR := ZBZ/g' \
            -e 's/DEVICE_MODEL := S20P DSA/DEVICE_MODEL := S20MP DSA/g' \
            -e 's/DEVICE_MODEL := S20P GSW/DEVICE_MODEL := S20MP GSW/g' \
            -e 's/\bmt7986\b/filogic/g' \
            -e 's/TARGET_mediatek_mt7986/TARGET_mediatek_filogic/g' \
            -e 's/DEVICE_PACKAGES :=/DEVICE_PACKAGES +=/g' \
            /tmp/clx-s20p-profiles.mk

          {
            echo ''
            echo '# CLX S20P ported from lgs2007m/immortalwrt-mt798x v7672'
            cat /tmp/clx-s20p-profiles.mk
          } >> "$new_image"

          grep -RniE 'clx_s20p|s20p' "$new_image" "$new_dts_dir"
          grep -q '^TARGET_DEVICES += clx_s20p-dsa$' "$new_image"
          grep -q '^TARGET_DEVICES += clx_s20p-gsw$' "$new_image"
          grep -Rq 'model = "ZBZ S20MP";' "$new_dts_dir"
          grep -Rq 'ethernet0 = &gmac0;' "$new_dts_dir"
          grep -Rq 'ethernet1 = &gmac1;' "$new_dts_dir"

      - name: Port CLX S20P network defaults
        working-directory: openwrt
        run: |
          set -euxo pipefail
          net_script="target/linux/mediatek/filogic/base-files/etc/board.d/02_network"
          test -f "$net_script"

          if ! grep -q 'clx,s20p-dsa' "$net_script"; then
            sed -i '/^[[:space:]]*\*)$/i\
          \tclx,s20p-dsa)\
          \t\tucidef_set_interfaces_lan_wan "lan1 lan2 lan3 lan4 lan5 lan6" eth1\
          \t\t;;\
          \tclx,s20p-gsw)\
          \t\tucidef_set_interfaces_lan_wan "eth0" "eth1"\
          \t\tucidef_add_switch "switch0" \\\
          \t\t\t"0:lan:5" "1:lan:4" "2:lan:3" "3:lan:2" "4:lan:1" "5:lan:6" "6u@eth0"\
          \t\t;;' "$net_script"
          fi

          if ! grep -q 'mmc_get_mac_binary factory 0x2a' "$net_script"; then
            perl -0pi -e 's/(\n\s*\[ -n "\$lan_mac" \] && ucidef_set_interface_macaddr "lan" "?\$lan_mac"?)/\n\tclx,s20p*)\n\t\tlan_mac=\$(mmc_get_mac_binary factory 0x2a)\n\t\twan_mac=\$(mmc_get_mac_binary factory 0x24)\n\t\tlabel_mac=\$lan_mac\n\t\t;;\n$1/s' "$net_script"
          fi

          grep -q 'ucidef_set_interfaces_lan_wan "lan1 lan2 lan3 lan4 lan5 lan6" eth1' "$net_script"
          grep -q 'ucidef_add_switch "switch0"' "$net_script"
          grep -q 'mmc_get_mac_binary factory 0x2a' "$net_script"
          grep -q 'mmc_get_mac_binary factory 0x24' "$net_script"
          grep -nA10 -B2 'clx,s20p' "$net_script"

      - name: Add iStore feed
        working-directory: openwrt
        run: |
          cat >> feeds.conf.default <<'EOF'
          src-git istore https://github.com/linkease/istore;main
          EOF

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds update istore
          ./scripts/feeds install -a
          for pkg in luci-app-store luci-app-istorex quickstart luci-lib-taskd luci-lib-xterm luci-theme-argon; do
            ./scripts/feeds install -d y -p istore "$pkg" || ./scripts/feeds install -d y "$pkg" || true
          done
          for pkg in luci-app-upnp luci-app-ddns luci-app-wol luci-app-arpbind luci-app-samba4 luci-app-filebrowser luci-app-filetransfer luci-app-diskman luci-app-openclash luci-app-passwall; do
            ./scripts/feeds install -d y "$pkg" || true
          done

      - name: Add CLX S20P first boot defaults
        working-directory: openwrt
        run: |
          set -euxo pipefail
          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/90-istore-theme <<'EOF'
          #!/bin/sh
          if [ -d /www/luci-static/argon ]; then
            uci -q set luci.main.mediaurlbase='/luci-static/argon'
            uci -q commit luci
          fi
          exit 0
          EOF

          cat > files/etc/uci-defaults/91-zbz-network <<'EOF'
          #!/bin/sh
          [ -r /lib/functions.sh ] && . /lib/functions.sh
          board="$(board_name 2>/dev/null)"
          case "$board" in
          clx,s20p-dsa)
            uci -q set network.br_lan='device'
            uci -q set network.br_lan.name='br-lan'
            uci -q set network.br_lan.type='bridge'
            uci -q delete network.br_lan.ports
            for port in lan1 lan2 lan3 lan4 lan5 lan6; do
              uci -q add_list network.br_lan.ports="$port"
            done

            uci -q set network.lan='interface'
            uci -q set network.lan.device='br-lan'
            uci -q delete network.lan.ifname

            uci -q set network.wan='interface'
            uci -q set network.wan.device='eth1'
            uci -q set network.wan.proto='dhcp'
            uci -q delete network.wan.ifname

            uci -q set network.wan6='interface'
            uci -q set network.wan6.device='eth1'
            uci -q set network.wan6.proto='dhcpv6'
            uci -q delete network.wan6.ifname

            uci -q commit network
            ;;
          esac
          exit 0
          EOF

          cat > files/etc/uci-defaults/99-expand-rootfs <<'EOF'
          #!/bin/sh
          MARK=/etc/.clx-s20p-rootfs-expanded
          DISK=/dev/mmcblk0
          PART=/dev/mmcblk0p6
          MNT=/tmp/clx-mmc-overlay

          log() {
            logger -t clx-expand-rootfs "$*"
          }

          [ -e "$MARK" ] && exit 0
          [ -b "$DISK" ] || exit 0
          [ -b "$PART" ] || exit 0

          overlay_src="$(findmnt -n -o SOURCE /overlay 2>/dev/null || true)"
          if [ "$overlay_src" = "$PART" ]; then
            log "overlay already mounted from $PART"
            touch "$MARK"
            exit 0
          fi

          fstype="$(blkid -s TYPE -o value "$PART" 2>/dev/null || true)"
          if [ -z "$fstype" ]; then
            if command -v mkfs.ext4 >/dev/null 2>&1; then
              log "$PART has no filesystem; creating ext4"
              mkfs.ext4 -F "$PART" >/dev/null 2>&1 || exit 0
              fstype="ext4"
            else
              log "$PART has no filesystem and mkfs.ext4 is missing"
              exit 0
            fi
          fi

          if [ "$fstype" = "ext4" ] && command -v resize2fs >/dev/null 2>&1; then
            resize2fs "$PART" >/dev/null 2>&1 || log "resize2fs reported non-fatal status"
          fi

          mkdir -p "$MNT"
          mounted_here=0
          existing_mnt="$(findmnt -n -o TARGET "$PART" 2>/dev/null | head -n1)"
          if [ -n "$existing_mnt" ]; then
            MNT="$existing_mnt"
          else
            mount "$PART" "$MNT" >/dev/null 2>&1 || exit 0
            mounted_here=1
          fi

          mkdir -p "$MNT/upper" "$MNT/work" "$MNT/upper/etc"
          if [ -d /overlay/upper ] && [ -z "$(ls -A "$MNT/upper" 2>/dev/null)" ]; then
            (cd /overlay/upper && tar -cpf - .) | (cd "$MNT/upper" && tar -xpf -) || log "copy current overlay upper failed"
          fi
          touch "$MNT/upper/etc/.clx-s20p-rootfs-expanded"

          mkdir -p /etc/config
          touch /etc/config/fstab
          uuid="$(block info "$PART" 2>/dev/null | sed -n 's/.*UUID="\([^"]*\)".*/\1/p')"
          uci -q delete fstab.clx_overlay
          uci -q set fstab.clx_overlay='mount'
          if [ -n "$uuid" ]; then
            uci -q set fstab.clx_overlay.uuid="$uuid"
          else
            uci -q set fstab.clx_overlay.device="$PART"
          fi
          uci -q set fstab.clx_overlay.target='/overlay'
          uci -q set fstab.clx_overlay.fstype="$fstype"
          uci -q set fstab.clx_overlay.options='rw,noatime'
          uci -q set fstab.clx_overlay.enabled='1'
          uci -q set fstab.clx_overlay.enabled_fsck='0'
          uci -q commit fstab

          touch "$MARK"
          [ "$mounted_here" -eq 1 ] && umount "$MNT" >/dev/null 2>&1 || true

          if echo "$overlay_src" | grep -q '^/dev/loop'; then
            log "configured $PART as extroot overlay; rebooting once to activate full eMMC overlay"
            (sleep 8; reboot) >/dev/null 2>&1 &
          else
            log "configured $PART as extroot overlay; reboot required to activate"
          fi
          exit 0
          EOF

          chmod 0755 files/etc/uci-defaults/90-istore-theme files/etc/uci-defaults/91-zbz-network files/etc/uci-defaults/99-expand-rootfs

      - name: Generate CLX S20P config
        working-directory: openwrt
        run: |
          set -euxo pipefail
          cat > .config <<'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-dsa=y
          CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_clx_s20p-dsa=""
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-gsw=y
          CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_clx_s20p-gsw=""
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-store=y
          CONFIG_PACKAGE_luci-app-istorex=y
          CONFIG_PACKAGE_luci-lib-taskd=y
          CONFIG_PACKAGE_luci-lib-xterm=y
          CONFIG_PACKAGE_quickstart=y
          CONFIG_PACKAGE_luci-theme-argon=y

          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-ttyd=y

          CONFIG_PACKAGE_lua-cjson=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-f2fs=y
          CONFIG_PACKAGE_kmod-fuse=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-br-netfilter=y
          CONFIG_PACKAGE_kmod-nf-ipvs=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_resize2fs=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_ip-bridge=y
          CONFIG_PACKAGE_kmod-nvme=y
          CONFIG_PACKAGE_pciutils=y
          CONFIG_PACKAGE_nvme-cli=y

          # Keep Wi-Fi disabled by default and do not pull hostapd/wpad.
          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set
          # CONFIG_PACKAGE_wpad-openssl is not set
          # CONFIG_PACKAGE_wpad is not set
          # CONFIG_PACKAGE_hostapd is not set
          # CONFIG_PACKAGE_iw is not set
          # CONFIG_PACKAGE_iwinfo is not set
          # CONFIG_PACKAGE_wireless-regdb is not set
          # CONFIG_PACKAGE_luci-app-mtwifi-cfg is not set
          # CONFIG_PACKAGE_luci-i18n-mtwifi-cfg-zh-cn is not set
          # CONFIG_PACKAGE_mtwifi-cfg is not set
          EOF

          for pkg in luci-app-upnp luci-app-ddns luci-app-wol luci-app-arpbind luci-app-samba4 luci-app-filebrowser luci-app-filetransfer luci-app-diskman luci-app-openclash luci-app-passwall; do
            if find feeds package -path "*/$pkg/Makefile" -print -quit | grep -q .; then
              echo "CONFIG_PACKAGE_${pkg}=y" >> .config
            else
              echo "Skip unavailable optional package: $pkg"
            fi
          done

          make defconfig

          grep -q '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-dsa=y' .config
          grep -q '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20p-gsw=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-store=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-dockerman=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-ttyd=y' .config
          grep -q '^CONFIG_PACKAGE_block-mount=y' .config
          grep -q '^CONFIG_PACKAGE_resize2fs=y' .config
          grep -q '^CONFIG_PACKAGE_kmod-nvme=y' .config
          grep -q '^CONFIG_PACKAGE_ip-bridge=y' .config || true
          grep -q '^# CONFIG_PACKAGE_wpad-basic-mbedtls is not set' .config
          grep -E '^CONFIG_PACKAGE_(luci-app-istorex|quickstart|luci-theme-argon|luci-app-upnp|luci-app-ddns|luci-app-wol|luci-app-arpbind|luci-app-samba4|luci-app-filebrowser|luci-app-filetransfer|luci-app-diskman)=y' .config || true

      - name: Port CLX S20P RTL822x vendor init
        working-directory: openwrt
        run: |
          set -euxo pipefail
          old_eth="../s20p-src/target/linux/mediatek/files-5.4/drivers/net/ethernet/mediatek"
          test -f "$old_eth/mtk_eth_rtl822x.c"
          test -d "$old_eth/rtl822x"

          make target/linux/prepare -j"$(nproc)" V=s

          linux_dir="$(find build_dir -path '*/linux-mediatek_filogic/linux-6.6*' -type d -print -quit)"
          if [ -z "$linux_dir" ]; then
            echo "::error::Unable to locate prepared Linux 6.6 source tree"
            exit 1
          fi

          mtk_dir="$linux_dir/drivers/net/ethernet/mediatek"
          test -f "$mtk_dir/mtk_eth_soc.c"
          test -f "$mtk_dir/mtk_eth_soc.h"

          cp -v "$old_eth/mtk_eth_rtl822x.c" "$mtk_dir/mtk_eth_rtl822x.c"
          rm -rf "$mtk_dir/rtl822x"
          cp -rv "$old_eth/rtl822x" "$mtk_dir/rtl822x"

          sed -i \
            -e '/mtk_eth_dbg.h/d' \
            -e '/mtk_eth_reset.h/d' \
            -e '/mtk_hnat\/nf_hnat_mtk.h/d' \
            "$mtk_dir/mtk_eth_rtl822x.c"

          perl -0pi -e 's/(#include "rtl822x\/nic_rtl8226b_init.h"\n)/$1\n#ifndef MII_MMD_ACC_CTL_REG\n#define MII_MMD_ACC_CTL_REG 0x0d\n#endif\n#ifndef MII_MMD_ADDR_DATA_REG\n#define MII_MMD_ADDR_DATA_REG 0x0e\n#endif\n#ifndef MMD_OP_MODE_DATA\n#define MMD_OP_MODE_DATA BIT(14)\n#endif\n\nstruct mtk_extphy_id {\n\tu32 phy_id;\n\tu32 phy_id_mask;\n\tu32 is_c45;\n\tint (*init)(struct mtk_eth *, int addr);\n};\n\nstatic int _mtk_mdio_read(struct mtk_eth *eth, u32 phy_addr, u32 phy_reg)\n{\n\treturn eth->mii_bus->read(eth->mii_bus, phy_addr, phy_reg);\n}\n\nstatic int _mtk_mdio_write(struct mtk_eth *eth, u32 phy_addr, u32 phy_reg,\n\t\t\t\t   u32 write_data)\n{\n\treturn eth->mii_bus->write(eth->mii_bus, phy_addr, phy_reg, write_data);\n}\n/s' "$mtk_dir/mtk_eth_rtl822x.c"

          perl -0pi -e 's/(#include <linux\/of_mdio.h>\n)/$1#include <linux\/gpio.h>\n#include <linux\/of_gpio.h>\n/s' "$mtk_dir/mtk_eth_soc.c"
          if ! grep -q 'mtk_soc_extphy_init' "$mtk_dir/mtk_eth_soc.c"; then
            perl -0pi -e 's/(#include "mtk_eth_soc.h"\n)/$1\nint mtk_soc_extphy_init(struct mtk_eth *eth, int addr);\n/s' "$mtk_dir/mtk_eth_soc.c"
          fi

          if ! grep -q 'clx_ext_reset_pin' "$mtk_dir/mtk_eth_soc.c"; then
            perl -0pi -e 's/(err = mtk_add_mac\(eth, mac_np\);\n\s*if \(err\) \{\n\s*of_node_put\(mac_np\);\n\s*goto err_deinit_hw;\n\s*\}\n)/$1\n\t\t{\n\t\t\tint clx_ext_reset_pin;\n\t\t\tint clx_reset_ret;\n\n\t\t\tclx_ext_reset_pin = of_get_named_gpio(mac_np, "ext-phy-reset-gpios", 0);\n\t\t\tif (gpio_is_valid(clx_ext_reset_pin)) {\n\t\t\t\tdev_info(&pdev->dev, "CLX ext-phy reset gpio: %d\\n", clx_ext_reset_pin);\n\t\t\t\tclx_reset_ret = gpio_request(clx_ext_reset_pin, "clx-ext-phy-reset");\n\t\t\t\tif (!clx_reset_ret) {\n\t\t\t\t\tgpio_direction_output(clx_ext_reset_pin, 0);\n\t\t\t\t\tmsleep(300);\n\t\t\t\t\tgpio_set_value(clx_ext_reset_pin, 1);\n\t\t\t\t\tmsleep(500);\n\t\t\t\t\tgpio_free(clx_ext_reset_pin);\n\t\t\t\t} else {\n\t\t\t\t\tdev_info(&pdev->dev, "CLX ext-phy reset gpio already requested: %d\\n", clx_reset_ret);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n/s' "$mtk_dir/mtk_eth_soc.c"
          fi

          if ! grep -q 'clx_ext_phy_reg' "$mtk_dir/mtk_eth_soc.c"; then
            perl -0pi -e 's/(if \(!MTK_HAS_CAPS\(eth->soc->caps, MTK_SOC_MT7628\)\) \{\n\s*err = mtk_mdio_init\(eth\);\n\s*if \(err\)\n\s*goto err_free_dev;\n\s*\}\n)/$1\n\tfor_each_child_of_node(pdev->dev.of_node, mac_np) {\n\t\tu32 clx_ext_phy_reg = 0;\n\n\t\tif (!of_device_is_compatible(mac_np, "mediatek,eth-mac"))\n\t\t\tcontinue;\n\n\t\tif (of_property_read_u32(mac_np, "ext-phy-reg", &clx_ext_phy_reg))\n\t\t\tcontinue;\n\n\t\tdev_info(&pdev->dev, "CLX ext-phy reg: %u\\n", clx_ext_phy_reg);\n\t\tmtk_soc_extphy_init(eth, clx_ext_phy_reg);\n\t}\n/s' "$mtk_dir/mtk_eth_soc.c"
          fi

          if ! grep -q 'mtk_eth_rtl822x.c' "$mtk_dir/mtk_eth_soc.c"; then
            perl -0pi -e 's/\nMODULE_AUTHOR/\n#include "mtk_eth_rtl822x.c"\n#include "rtl822x\/rtl_adapter.c"\n#include "rtl822x\/nic_rtl8226b_init.c"\n\nMODULE_AUTHOR/s' "$mtk_dir/mtk_eth_soc.c"
          fi

          grep -q 'clx_ext_reset_pin' "$mtk_dir/mtk_eth_soc.c"
          grep -q 'clx_ext_phy_reg' "$mtk_dir/mtk_eth_soc.c"
          grep -q 'gpio_free(clx_ext_reset_pin)' "$mtk_dir/mtk_eth_soc.c"
          grep -q 'rtl822x/rtl_adapter.c' "$mtk_dir/mtk_eth_soc.c"
          grep -q 'rtl822x/nic_rtl8226b_init.c' "$mtk_dir/mtk_eth_soc.c"
          grep -q 'mtk_eth_rtl822x.c' "$mtk_dir/mtk_eth_soc.c"
          grep -q '_mtk_mdio_read' "$mtk_dir/mtk_eth_rtl822x.c"
          grep -n 'CLX ext-phy\|mtk_eth_rtl822x.c\|mtk_soc_extphy_init' "$mtk_dir/mtk_eth_soc.c"
          grep -n 'Rtl8226b_phy_init\|RTL822x init success' "$mtk_dir/mtk_eth_rtl822x.c"

      - name: Download packages
        working-directory: openwrt
        run: |
          make download -j"$(nproc)"
          find dl -size -1024c -print -delete

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: List firmware outputs
        if: always()
        working-directory: openwrt
        run: |
          if [ ! -d bin/targets ]; then
            echo "bin/targets does not exist yet"
            exit 0
          fi
          find bin/targets -maxdepth 5 -type f -printf "%p %s bytes\n" | sort
          find bin/targets -type f \( -name "*.bin" -o -name "*.itb" -o -name "*sysupgrade*" \) -printf "%p %s bytes\n" | sort
          grep -E "CONFIG_TARGET_DEVICE_.*s20p|CONFIG_TARGET_PROFILE|CONFIG_TARGET_MULTI_PROFILE" .config || true

      - name: Verify real S20P firmware output
        working-directory: openwrt
        run: |
          set -euxo pipefail
          target_dir="bin/targets/mediatek/filogic"
          test -d "$target_dir"

          sysupgrade_count="$(find "$target_dir" -maxdepth 1 -type f -iname '*s20p*sysupgrade*' | wc -l)"
          firmware_count="$(find "$target_dir" -maxdepth 1 -type f \( -iname '*s20p*.bin' -o -iname '*s20p*.itb' \) | wc -l)"

          if [ "$sysupgrade_count" -eq 0 ]; then
            echo "::error::Missing *s20p*sysupgrade* output in $target_dir"
            exit 1
          fi

          if [ "$firmware_count" -eq 0 ]; then
            echo "::error::Missing *s20p*.bin or *s20p*.itb output in $target_dir"
            exit 1
          fi

          find "$target_dir" -maxdepth 1 -type f \( -iname '*s20p*sysupgrade*' -o -iname '*s20p*.bin' -o -iname '*s20p*.itb' \) -printf '%p %s bytes\n' | sort

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: clx-s20p-immortalwrt-24.10
          if-no-files-found: error
          path: |
            openwrt/bin/targets/mediatek/filogic/*s20p*
            openwrt/bin/targets/mediatek/filogic/*S20P*
            openwrt/bin/targets/mediatek/filogic/sha256sums
            openwrt/bin/targets/mediatek/filogic/config.buildinfo
            openwrt/bin/targets/mediatek/filogic/profiles.json
